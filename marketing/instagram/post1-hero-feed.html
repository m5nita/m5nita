<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1080">
  <title>Post 1 — Hero Feed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1080px;
      background: #F5F0E8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .logo-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #111111;
      letter-spacing: 10px;
      text-transform: uppercase;
    }
    .accent-bar {
      width: 48px;
      height: 6px;
      background: #C4362A;
      border-radius: 1px;
    }
    .headline {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 120px;
      font-weight: 900;
      color: #111111;
      text-transform: uppercase;
      line-height: 0.92;
      text-align: center;
      letter-spacing: -2px;
    }
    .accent-bar-wide {
      width: 80px;
      height: 6px;
      background: #C4362A;
      border-radius: 1px;
    }
    .subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 28px;
      font-weight: 400;
      color: #8D8677;
      text-align: center;
      line-height: 1.5;
    }
    .url {
      position: absolute;
      bottom: 48px;
      font-family: 'Inter', sans-serif;
      font-size: 24px;
      font-weight: 600;
      color: #C4362A;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="logo-text">M5NITA</div>
  <div class="accent-bar" style="margin-top: 16px;"></div>
  <div class="headline" style="margin-top: 64px;">
    Monte<br>seu<br>bolão
  </div>
  <div class="accent-bar-wide" style="margin-top: 48px;"></div>
  <div class="subtitle" style="margin-top: 32px;">
    Palpites, ranking e prêmio.<br>Simples assim.
  </div>
  <div class="url">m5nita.com</div>
</body>
</html>
