<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920">
  <title>Post 5 — CTA Final Story</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1920px;
      background: #F5F0E8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .logo-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 34px;
      font-weight: 700;
      color: #111111;
      letter-spacing: 12px;
      text-transform: uppercase;
    }
    .accent-bar {
      width: 56px;
      height: 7px;
      background: #C4362A;
      border-radius: 1px;
      margin-top: 20px;
    }
    .price-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 40px;
      font-weight: 700;
      color: #8D8677;
      text-transform: uppercase;
      letter-spacing: 5px;
      margin-top: 80px;
    }
    .headline {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 110px;
      font-weight: 900;
      color: #111111;
      text-transform: uppercase;
      line-height: 0.92;
      text-align: center;
      letter-spacing: -2px;
      margin-top: 24px;
    }
    .cta-button {
      margin-top: 72px;
      background: #C4362A;
      padding: 28px 72px;
      border-radius: 10px;
    }
    .cta-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 40px;
      font-weight: 800;
      color: #FAFAF8;
      text-transform: uppercase;
      letter-spacing: 5px;
    }
    .url {
      position: absolute;
      bottom: 72px;
      font-family: 'Inter', sans-serif;
      font-size: 28px;
      font-weight: 600;
      color: #111111;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="logo-text">M5NITA</div>
  <div class="accent-bar"></div>

  <div class="price-label">A partir de R$ 1,00</div>
  <div class="headline">
    Seu bolão<br>da Copa<br>começa aqui
  </div>

  <div class="cta-button">
    <div class="cta-text">Começar agora</div>
  </div>

  <div class="url">m5nita.com</div>
</body>
</html>
