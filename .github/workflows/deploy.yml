name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # Allow manual re-trigger from the Actions UI without re-running CI
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-api:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Trigger Coolify deploy (api)
        env:
          COOLIFY_API_URL: ${{ secrets.COOLIFY_API_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_API_UUID: ${{ secrets.COOLIFY_API_UUID }}
        run: |
          curl -fsS -X GET \
            "${COOLIFY_API_URL}/api/v1/deploy?uuid=${COOLIFY_API_UUID}&force=false" \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}"

      - name: Wait for api to be running
        env:
          COOLIFY_API_URL: ${{ secrets.COOLIFY_API_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: ./scripts/ci/wait-for-coolify.sh "${{ secrets.COOLIFY_API_UUID }}"

  deploy-web:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Trigger Coolify deploy (web)
        env:
          COOLIFY_API_URL: ${{ secrets.COOLIFY_API_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_WEB_UUID: ${{ secrets.COOLIFY_WEB_UUID }}
        run: |
          curl -fsS -X GET \
            "${COOLIFY_API_URL}/api/v1/deploy?uuid=${COOLIFY_WEB_UUID}&force=false" \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}"

      - name: Wait for web to be running
        env:
          COOLIFY_API_URL: ${{ secrets.COOLIFY_API_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: ./scripts/ci/wait-for-coolify.sh "${{ secrets.COOLIFY_WEB_UUID }}"

  notify:
    needs: [deploy-api, deploy-web]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_DEPLOY_CHAT_ID }}
          API_RESULT: ${{ needs.deploy-api.result }}
          WEB_RESULT: ${{ needs.deploy-web.result }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ "$API_RESULT" == "success" && "$WEB_RESULT" == "success" ]]; then
            title="✅ Deploy successful"
          else
            title="🚨 Deploy failed"
          fi

          text="${title}
          api: \`${API_RESULT}\`
          web: \`${WEB_RESULT}\`
          commit: \`${SHA:0:7}\`
          [ver logs](${RUN_URL})"

          curl -fsS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d parse_mode=Markdown \
            --data-urlencode text="${text}"
