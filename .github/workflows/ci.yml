name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly flake check — 06:00 UTC (03:00 BRT)
    - cron: '0 6 * * *'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint-and-typecheck:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  test:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: m5nita_test
          POSTGRES_PASSWORD: m5nita_test
          POSTGRES_DB: m5nita_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
        env:
          DATABASE_URL: postgresql://m5nita_test:m5nita_test@localhost:5433/m5nita_test
      - name: Integration tests (wall-clock-budgeted)
        run: apps/api/tests/integration/scripts/run-with-budget.sh
        env:
          DATABASE_URL: postgresql://m5nita_test:m5nita_test@localhost:5433/m5nita_test
          NODE_ENV: test
          INTEGRATION_BUDGET_SECONDS: '180'
      - name: Upload integration failure bundles
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-failures
          path: apps/api/tests/integration/.artifacts/**
          if-no-files-found: ignore
          retention-days: 7

  build:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        env:
          # Placeholder DSN so the Sentry code path is kept in the bundle
          # (otherwise dead-code elimination drops it and the size check
          # measures a bundle shape that does not match production).
          VITE_SENTRY_DSN: https://placeholder@sentry.io/0
        run: pnpm build
      - name: Check bundle size
        run: |
          ENTRY_BUDGET_KB=160
          TOTAL_BUDGET_KB=290
          # Pre-hydration inline script in index.html must stay tiny to preserve FCP
          # (feature 015 — dark-mode theme). 1KB raw is the hard ceiling.
          INLINE_SCRIPT_BUDGET_BYTES=1024

          # Largest index-*.js chunk is the entry (first-load cost).
          ENTRY_FILE=$(ls -S apps/web/dist/assets/index-*.js | head -1)
          ENTRY_GZIP_KB=$(( $(gzip -c "$ENTRY_FILE" | wc -c) / 1024 ))

          # Sum of per-file gzip sizes = what a user transfers across all routes.
          TOTAL_GZIP_BYTES=0
          for f in apps/web/dist/assets/*.js; do
            TOTAL_GZIP_BYTES=$(( TOTAL_GZIP_BYTES + $(gzip -c "$f" | wc -c) ))
          done
          TOTAL_GZIP_KB=$(( TOTAL_GZIP_BYTES / 1024 ))

          # Inline theme-bootstrap script size in the built index.html.
          INLINE_SCRIPT_BYTES=$(awk '/<script>/,/<\/script>/' apps/web/dist/index.html | wc -c | tr -d ' ')

          echo "Entry chunk    (gzip): ${ENTRY_GZIP_KB}KB / ${ENTRY_BUDGET_KB}KB — $(basename "$ENTRY_FILE")"
          echo "All chunks     (gzip): ${TOTAL_GZIP_KB}KB / ${TOTAL_BUDGET_KB}KB"
          echo "Inline script  (raw):  ${INLINE_SCRIPT_BYTES}B / ${INLINE_SCRIPT_BUDGET_BYTES}B"

          FAILED=0
          if [ "$ENTRY_GZIP_KB" -gt "$ENTRY_BUDGET_KB" ]; then
            echo "::error::Entry chunk gzipped (${ENTRY_GZIP_KB}KB) exceeds budget (${ENTRY_BUDGET_KB}KB)"
            FAILED=1
          fi
          if [ "$TOTAL_GZIP_KB" -gt "$TOTAL_BUDGET_KB" ]; then
            echo "::error::Total gzipped (${TOTAL_GZIP_KB}KB) exceeds budget (${TOTAL_BUDGET_KB}KB)"
            FAILED=1
          fi
          if [ "$INLINE_SCRIPT_BYTES" -gt "$INLINE_SCRIPT_BUDGET_BYTES" ]; then
            echo "::error::Inline pre-hydration script (${INLINE_SCRIPT_BYTES}B) exceeds budget (${INLINE_SCRIPT_BUDGET_BYTES}B)"
            FAILED=1
          fi
          exit $FAILED

  # Runs the integration suite 10 times back-to-back to catch
  # flaky tests before they erode trust in the suite. Fires on every push to
  # main (catches flakes introduced by the commit that just merged) and on a
  # nightly cron (catches environmental flakes unrelated to any commit).
  # Does NOT run on PR — PR latency matters more than catching flakes the
  # nightly run will surface anyway.
  integration-flake-check:
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: m5nita_test
          POSTGRES_PASSWORD: m5nita_test
          POSTGRES_DB: m5nita_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run integration suite 10x
        env:
          DATABASE_URL: postgresql://m5nita_test:m5nita_test@localhost:5433/m5nita_test
          NODE_ENV: test
        run: |
          for i in $(seq 1 10); do
            echo "::group::Integration run $i/10"
            if ! pnpm --filter @m5nita/api test:integration; then
              echo "::error::Flake detected on run $i/10"
              exit 1
            fi
            echo "::endgroup::"
          done
      - name: Upload failure bundles
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flake-check-failures
          path: apps/api/tests/integration/.artifacts/**
          if-no-files-found: ignore
          retention-days: 14
